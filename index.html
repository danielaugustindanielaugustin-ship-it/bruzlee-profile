<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruzlee Raj Portfolio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
padding:30px;
}

.profile{
text-align:center;
padding:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:20px;
}

.profile img{
width:180px;
height:180px;
border-radius:50%;
border:5px solid #00d4ff;
object-fit:cover;
}

.profile h1{
margin-top:15px;
font-size:40px;
}

.profile p{
font-size:20px;
color:#cbd5e1;
}

.upload-btn{
margin-top:15px;
padding:10px 20px;
background:#00d4ff;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.section{
margin-top:30px;
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:20px;
}

.section h2{
margin-bottom:15px;
color:#00d4ff;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:10px;
border:none;
font-size:16px;
}

input[type=text]{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

button{
padding:12px 25px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00d4ff;
cursor:pointer;
font-weight:bold;
}

.google-box{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.google-box input{
flex:1;
}

.skills{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.skill{
background:#00d4ff;
color:black;
padding:10px 15px;
border-radius:20px;
font-weight:bold;
}

footer{
text-align:center;
padding:20px;
margin-top:30px;
}

@media(max-width:768px){
.profile h1{
font-size:30px;
}
}
</style>
</head>
<body>

<div class="container">

<div class="profile">

<img id="profileImage"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<br>

<input type="file" id="imageUpload" hidden>

<button class="upload-btn"
onclick="document.getElementById('imageUpload').click()">
Change Photo
</button>

<h1 contenteditable="true">BRUZLEE RAJ</h1>

<p contenteditable="true">
Electronics & Communication Engineering
</p>

</div>

<div class="section">

<h2>About Me</h2>

<textarea id="about">
Highly skilled Electronics and Communication Engineer with expertise in communication systems, embedded systems, IoT and software development.
</textarea>

</div>

<div class="section">

<h2>Skills</h2>

<div class="skills">
<div class="skill">HTML</div>
<div class="skill">CSS</div>
<div class="skill">JavaScript</div>
<div class="skill">Python</div>
<div class="skill">IoT</div>
<div class="skill">MATLAB</div>
</div>

</div>

<div class="section">

<h2>Education</h2>

<textarea>
B.E Electronics & Communication Engineering
Panimalar Engineering College

Diploma in ECE
S.A Polytechnic College
</textarea>

</div>

<div class="section">

<h2>Google Search</h2>

<div class="google-box">

<input type="text"
id="googleSearch"
placeholder="Search Google">

<button onclick="searchGoogle()">
Search
</button>

</div>

</div>

<div class="section">

<h2>Contact</h2>

<p>Email:
<span contenteditable="true">
bruzeeliraj@gmail.com
</span>
</p>

<br>

<p>Phone:
<span contenteditable="true">
9344935594
</span>
</p>

</div>

<footer>
© 2026 Bruzlee Raj Portfolio Website
</footer>

</div>

<script>

document.getElementById("imageUpload")
.addEventListener("change",function(event){

const file=event.target.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

document.getElementById("profileImage")
.src=e.target.result;

};

reader.readAsDataURL(file);

}

});

function searchGoogle(){

let query=document
.getElementById("googleSearch")
.value;

if(query.trim()!==""){

window.open(
"https://www.google.com/search?q="
+ encodeURIComponent(query),
"_blank"
);

}

}

</script>

</body>
</html>
